# Docker Compose avec profils
# Profils disponibles:
# - infrastructure: Services de base (Traefik, OMV-Proxy, Portainer, Watchtower, Dockhand, Glances, CrowdSec, Authentik)
# - dashboard: Tableaux de bord (Homepage)
# - media: Services liés aux médias (Jellyfin, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent)
# - devtools: Outils de développement (SonarQube, sonarqube-db)
# - domotique: Services domotique (Home Assistant avec support Zigbee)
# - security: Sécurité (CrowdSec agent + bouncer Traefik)
# - tools: Outils (RSSHub, FreshRSS, Keeper.sh)
# - all: Tous les services
#
# Utilisation:
# - Démarrer un profil: docker compose --profile media up -d
# - Démarrer plusieurs profils: docker compose --profile media --profile automation up -d
# - Démarrer tous les services: docker compose --profile all up -d
# - Arrêter un profil: docker compose --profile media down

services:
  # Traefik - Reverse Proxy
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    environment:
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command:
      - "--api.dashboard=false"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--log.level=DEBUG"
      - "--ping=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsEncrypt.acme.httpChallenge.entryPoint=web"
      - "--certificatesresolvers.letsEncrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsEncrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Logs pour CrowdSec
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
    ports:
      - 80:80
      - 443:443
    extra_hosts:
      - "host.docker.internal:host-gateway" # A TESTER
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - traefik_letsencrypt:/letsencrypt
      - traefik_config:/etc/traefik
      - traefik_logs:/var/log/traefik
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      # Middleware CrowdSec Bouncer (protection globale)
      - "traefik.http.middlewares.crowdsec-bouncer.forwardauth.address=http://crowdsec-bouncer-traefik:8080/api/v1/forwardAuth"
      - "traefik.http.middlewares.crowdsec-bouncer.forwardauth.trustForwardHeader=true"
    profiles:
      - infrastructure
      - all

  # Proxy pour OpenMediaVault (permet l'accès via Traefik)
  omv-proxy:
    image: nginx:alpine
    container_name: omv-proxy
    restart: "on-failure:2"
    mem_limit: 32m
    memswap_limit: 32m
    depends_on:
      authentik-server:
        condition: service_healthy
    networks:
      - traefik_net
    volumes:
      - ./nginx-omv.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omv.rule=Host(`omv.${DOMAIN_BASE}`)"
      - "traefik.http.routers.omv.entrypoints=websecure"
      - "traefik.http.routers.omv.tls=true"
      - "traefik.http.routers.omv.tls.certresolver=letsEncrypt"
      - "traefik.http.services.omv.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.omv.middlewares=crowdsec-bouncer@docker,authentik-omv@docker"
      - "traefik.http.middlewares.authentik-omv.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-omv.forwardauth.trustForwardHeader=true"
    environment:
      - TZ=${TZ}
    profiles:
      - infrastructure
      - all

  # Homarr - Dashboard
  # Portainer - Container Management
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: "on-failure:2"
    mem_limit: 128m
    memswap_limit: 128m
    networks:
      - traefik_net
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN_BASE}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsEncrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.portainer.middlewares=crowdsec-bouncer@docker"
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
    depends_on:
      traefik:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    profiles:
      - infrastructure
      - all

  # Watchtower - Auto-updates
  # Jellyseerr - Demandes de médias pour Jellyfin
  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055/api/v1/settings/public || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - jellyseerr_config:/app/config
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN_BASE}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.tls.certresolver=letsEncrypt"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=traefik_net"
      # CrowdSec only (OIDC géré directement par Jellyseerr)
      - "traefik.http.routers.jellyseerr.middlewares=crowdsec-bouncer@docker"
    profiles:
      - media
      - all

  # Jellyfin - Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: "on-failure:2"
    mem_limit: 2g
    memswap_limit: 2g
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${DOMAIN_BASE}
    user: "${PUID}:${PGID}"
    volumes:
      - jellyfin_config:/config
      - ${MEDIA_PATH}:/data
      - jellyfin_cache:/cache
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128 # GPU render device (principal)
      - /dev/dri/card0:/dev/dri/card0 # GPU card 0
      - /dev/dri/card1:/dev/dri/card1 # GPU card 1
      - /dev/video19:/dev/video19 # HEVC/H265 decoder
    group_add:
      - "44" # video group
      - "109" # render group
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN_BASE}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsEncrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.jellyfin.middlewares=crowdsec-bouncer@docker"
    profiles:
      - media
      - all

  # Radarr - Films
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - radarr_config:/config
      - ${MEDIA_PATH}:/data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN_BASE}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsEncrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.radarr.middlewares=crowdsec-bouncer@docker,authentik-radarr@docker"
      - "traefik.http.middlewares.authentik-radarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-radarr.forwardauth.trustForwardHeader=true"
    profiles:
      - media
      - all

  # Sonarr - Séries TV
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - sonarr_config:/config
      - ${MEDIA_PATH}:/data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN_BASE}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=letsEncrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.sonarr.middlewares=crowdsec-bouncer@docker,authentik-sonarr@docker"
      - "traefik.http.middlewares.authentik-sonarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-sonarr.forwardauth.trustForwardHeader=true"
    profiles:
      - media
      - all

  # Gluetun - VPN Gateway (ProtonVPN WireGuard)
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${GLUETUN_WG_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - WIREGUARD_IMPLEMENTATION=userspace
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbt.${DOMAIN_BASE}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsEncrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.qbittorrent.middlewares=crowdsec-bouncer@docker,authentik-qbittorrent@docker"
      - "traefik.http.middlewares.authentik-qbittorrent.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-qbittorrent.forwardauth.trustForwardHeader=true"
    profiles:
      - media
      - all

  # qBittorrent - Client Torrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - ${MEDIA_PATH}:/data
    profiles:
      - media
      - all

  # Prowlarr - Indexer Manager
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - prowlarr_config:/config
      - ./ygege.yml:/config/Definitions/Custom/ygege.yml:ro
    networks:
      - traefik_net
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN_BASE}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsEncrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.prowlarr.middlewares=crowdsec-bouncer@docker,authentik-prowlarr@docker"
      - "traefik.http.middlewares.authentik-prowlarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-prowlarr.forwardauth.trustForwardHeader=true"
    profiles:
      - media
      - all

  # RSSHub - RSS Feed Generator
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:1200/'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rsshub.rule=Host(`rsshub.${DOMAIN_BASE}`)"
      - "traefik.http.routers.rsshub.entrypoints=websecure"
      - "traefik.http.routers.rsshub.tls=true"
      - "traefik.http.routers.rsshub.tls.certresolver=letsEncrypt"
      - "traefik.http.services.rsshub.loadbalancer.server.port=1200"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.rsshub.middlewares=crowdsec-bouncer@docker"
    profiles:
      - tools
      - all

  # FreshRSS - RSS Feed Reader
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f apache2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
      - CRON_MIN=1,31
      # OIDC Configuration avec Authentik
      - OIDC_ENABLED=1
      - OIDC_PROVIDER_METADATA_URL=https://auth.${DOMAIN_BASE}/application/o/freshrss/.well-known/openid-configuration
      - OIDC_CLIENT_ID=${FRESHRSS_OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${FRESHRSS_OIDC_CLIENT_SECRET}
      - OIDC_X_FORWARDED_HEADERS=X-Forwarded-Port X-Forwarded-Proto X-Forwarded-Host
      - OIDC_SCOPES=openid email profile
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freshrss.rule=Host(`rss.${DOMAIN_BASE}`)"
      - "traefik.http.routers.freshrss.entrypoints=websecure"
      - "traefik.http.routers.freshrss.tls=true"
      - "traefik.http.routers.freshrss.tls.certresolver=letsEncrypt"
      - "traefik.http.services.freshrss.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.freshrss.middlewares=crowdsec-bouncer@docker"
    profiles:
      - tools
      - all

  # Keeper.sh - Synchronisation de calendriers (PostgreSQL dédié)
  keeper-db:
    image: postgres:16-alpine
    container_name: keeper-db
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      POSTGRES_USER: ${KEEPER_POSTGRES_USER:-keeper}
      POSTGRES_PASSWORD: ${KEEPER_POSTGRES_PASSWORD:?keeper database password required}
      POSTGRES_DB: ${KEEPER_POSTGRES_DB:-keeper}
      TZ: ${TZ}
    volumes:
      - keeper_postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - tools
      - all

  # Keeper.sh - Redis dédié (queue BullMQ)
  keeper-redis:
    image: redis:7-alpine
    container_name: keeper-redis
    restart: "on-failure:2"
    mem_limit: 64m
    memswap_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik_net
    profiles:
      - tools
      - all

  # Keeper.sh - Synchronisation de calendriers
  keeper:
    image: ghcr.io/ridafkih/keeper-services:latest
    container_name: keeper
    restart: "on-failure:2"
    mem_limit: 1g
    memswap_limit: 1g
    depends_on:
      keeper-db:
        condition: service_healthy
      keeper-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - TZ=${TZ}
      - DATABASE_URL=postgres://${KEEPER_POSTGRES_USER:-keeper}:${KEEPER_POSTGRES_PASSWORD}@keeper-db:5432/${KEEPER_POSTGRES_DB:-keeper}
      - REDIS_URL=redis://keeper-redis:6379
      - BETTER_AUTH_SECRET=${KEEPER_AUTH_SECRET:?keeper auth secret required}
      - BETTER_AUTH_URL=https://keeper.${DOMAIN_BASE}
      - ENCRYPTION_KEY=${KEEPER_ENCRYPTION_KEY:?keeper encryption key required}
      - TRUSTED_ORIGINS=https://keeper.${DOMAIN_BASE}
      - WORKER_JOB_QUEUE_ENABLED=true
      - BLOCK_PRIVATE_RESOLUTION=false
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keeper.rule=Host(`keeper.${DOMAIN_BASE}`)"
      - "traefik.http.routers.keeper.entrypoints=websecure"
      - "traefik.http.routers.keeper.tls=true"
      - "traefik.http.routers.keeper.tls.certresolver=letsEncrypt"
      - "traefik.http.services.keeper.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy (remplacer par OIDC natif quand configuré)
      - "traefik.http.routers.keeper.middlewares=crowdsec-bouncer@docker,authentik-keeper@docker"
      - "traefik.http.middlewares.authentik-keeper.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-keeper.forwardauth.trustForwardHeader=true"
    profiles:
      - tools
      - all

  # YGege - Nostr to Torznab Bridge
  ygege:
    image: uwucode/ygege:latest
    container_name: ygege
    restart: "on-failure:2"
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:$${BIND_PORT:-8715}/health || exit 1",
        ]
      interval: 1m30s
      timeout: 20s
      retries: 3
      start_period: 10s
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    networks:
      - traefik_net
    profiles:
      - media
      - all

  # Home Assistant
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: "on-failure:2"
    network_mode: host
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - homeassistant_config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - ${ZIGBEE_DONGLE_PATH}:/dev/ttyUSB0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homeassistant.rule=Host(`home.${DOMAIN_BASE}`)"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls=true"
      - "traefik.http.routers.homeassistant.tls.certresolver=letsEncrypt"
      - "traefik.http.services.homeassistant.loadbalancer.server.url=http://host.docker.internal:8123"
      # CrowdSec protection
      - "traefik.http.routers.homeassistant.middlewares=crowdsec-bouncer@docker"
    profiles:
      - domotique
      - all

  # PostgreSQL Authentik - Base de données dédiée
  authentik-db:
    image: postgres:16-alpine
    container_name: authentik-db
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?authentik database password required}
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB:-authentik}
      TZ: ${TZ}
    volumes:
      - postgres_authentik_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - infrastructure
      - devtools
      - all

  # Authentik Server - SSO/Identity Provider
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10.1
    container_name: authentik-server
    restart: unless-stopped
    command: server
    mem_limit: 1g
    memswap_limit: 1g
    depends_on:
      authentik-db:
        condition: service_healthy
    networks:
      - traefik_net
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9000/-/health/live/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?authentik secret key required}
      TZ: ${TZ}
    volumes:
      - authentik_media:/media
      - authentik_custom_templates:/templates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN_BASE}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.tls.certresolver=letsEncrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.authentik.middlewares=crowdsec-bouncer@docker"
    profiles:
      - infrastructure
      - devtools
      - all


  # Homepage - Dashboard léger
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    networks:
      - traefik_net
    volumes:
      - ./homepage-settings/services.yaml:/app/config/services.yaml
      - ./homepage-settings/settings.yaml:/app/config/settings.yaml
      - ./homepage-settings/widgets.yaml:/app/config/widgets.yaml
      - ./homepage-settings/docker.yaml:/app/config/docker.yaml
      - homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${DOMAIN_BASE}
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN_BASE}
      - HOMEPAGE_VAR_RADARR_API_KEY=${RADARR_API_KEY}
      - HOMEPAGE_VAR_SONARR_API_KEY=${SONARR_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`${DOMAIN_BASE}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.tls.certresolver=letsEncrypt"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec + Authentik SSO via Proxy
      - "traefik.http.routers.homepage.middlewares=crowdsec-bouncer@docker,authentik-homepage@docker"
      - "traefik.http.middlewares.authentik-homepage.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-homepage.forwardauth.trustForwardHeader=true"
    profiles:
      - dashboard
      - infrastructure
      - all

  # SonarQube - Analyse de code
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: on-failure
    mem_limit: 2560m
    memswap_limit: 2560m
    depends_on:
      sonarqube-db:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/api/system/status || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_POSTGRES_DB:-sonarqube}
      - SONAR_JDBC_USERNAME=${SONARQUBE_POSTGRES_USER:-sonarqube}
      - SONAR_JDBC_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD:?sonarqube database password required}
      # Limites mémoire JVM (Xms doit être égal à Xmx pour Elasticsearch)
      - SONAR_WEB_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_CE_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_SEARCH_JAVAOPTS=-Xmx512m -Xms512m
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarqube.rule=Host(`sonarqube.${DOMAIN_BASE}`)"
      - "traefik.http.routers.sonarqube.entrypoints=websecure"
      - "traefik.http.routers.sonarqube.tls=true"
      - "traefik.http.routers.sonarqube.tls.certresolver=letsEncrypt"
      - "traefik.http.services.sonarqube.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.sonarqube.middlewares=crowdsec-bouncer@docker"
    profiles:
      - devtools
      - all

  # SonarQube PostgreSQL Database
  sonarqube-db:
    image: postgres:16-alpine
    container_name: sonarqube-db
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SONARQUBE_POSTGRES_USER:-sonarqube} -d ${SONARQUBE_POSTGRES_DB:-sonarqube}",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - POSTGRES_USER=${SONARQUBE_POSTGRES_USER:-sonarqube}
      - POSTGRES_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD:?sonarqube database password required}
      - POSTGRES_DB=${SONARQUBE_POSTGRES_DB:-sonarqube}
      - TZ=${TZ}
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - devtools
      - all

  # Glances - Monitoring
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: "on-failure:2"
    pid: host
    mem_limit: 128m
    memswap_limit: 128m
    networks:
      - traefik_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    environment:
      - TZ=${TZ}
      - GLANCES_OPT=-w
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`glances.${DOMAIN_BASE}`)"
      - "traefik.http.routers.glances.entrypoints=websecure"
      - "traefik.http.routers.glances.tls=true"
      - "traefik.http.routers.glances.tls.certresolver=letsEncrypt"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.glances.middlewares=crowdsec-bouncer@docker,authentik-glances@docker"
      - "traefik.http.middlewares.authentik-glances.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-glances.forwardauth.trustForwardHeader=true"
    profiles:
      - infrastructure
      - all

  # CrowdSec - Security Engine (IPS collaboratif)
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/whitelist-good-actors crowdsecurity/linux
      - GID=${PGID}
      # Enroll key pour la console CrowdSec
      - ENROLL_KEY=${CROWDSEC_ENROLL_KEY}
      - ENROLL_INSTANCE_NAME=${HOSTNAME:-docker-server}
    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data
      # Configuration d'acquisition personnalisée
      - ./crowdsec-acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      # Logs Traefik à analyser
      - traefik_logs:/var/log/traefik:ro
      # Logs SSH (host)
      - /var/log/auth.log:/var/log/auth.log:ro
      # Docker socket pour lire les logs des conteneurs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_net
    profiles:
      - security
      - infrastructure
      - all

  # CrowdSec Bouncer Traefik - Bloque les IP malveillantes
  crowdsec-bouncer-traefik:
    image: fbonalair/traefik-crowdsec-bouncer:latest
    container_name: crowdsec-bouncer-traefik
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    depends_on:
      crowdsec:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY:?crowdsec bouncer api key required}
      - CROWDSEC_AGENT_HOST=crowdsec:8080
      - GIN_MODE=release
    networks:
      - traefik_net
    profiles:
      - security
      - infrastructure
      - all

networks:
  traefik_net:
    name: traefik_net
    external: true

volumes:
  # Traefik
  traefik_letsencrypt:
  traefik_config:
  traefik_logs:

  # Homepage
  homepage_config:

  # Portainer
  portainer_data:

  # Jellyseerr
  jellyseerr_config:

  # Jellyfin
  jellyfin_config:
  jellyfin_cache:

  # Radarr
  radarr_config:

  # Sonarr
  sonarr_config:

  # qBittorrent
  qbittorrent_config:

  # Prowlarr
  prowlarr_config:

  # Home Assistant
  homeassistant_config:

  # Authentik
  postgres_authentik_data:
  authentik_media:
  authentik_custom_templates:

  # SonarQube
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres_data:

  # CrowdSec
  crowdsec_config:
  crowdsec_data:

  # FreshRSS
  freshrss_data:
  freshrss_extensions:

  # Keeper.sh
  keeper_postgres_data:
