# Docker Compose with profiles
# Available profiles:
# - infrastructure : Core services (Traefik, Portainer, Authentik, Homepage, Glances, CrowdSec)
# - dashboard      : Dashboards (Homepage)
# - media          : Media (Jellyfin, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent + Gluetun, Jellystat, Ygège)
# - devtools       : Developer tools (SonarQube, Authentik)
# - security       : Security (CrowdSec + Traefik bouncer)
# - tools          : Tools (RSSHub, FreshRSS)
# - all            : All services
#
# The PostgreSQL databases (Authentik, Jellystat, SonarQube) start with their
# parent service and have no dedicated profile.
#
# Usage:
# - Start a profile: docker compose --profile media up -d
# - Start several profiles: docker compose --profile media --profile tools up -d
# - Start everything: docker compose --profile all up -d
# - Stop a profile: docker compose --profile media down

services:
  # Traefik - Reverse Proxy
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    environment:
      - TZ=${TZ}
      - CROWDSEC_BOUNCER_API_KEY=${CROWDSEC_BOUNCER_API_KEY}
      - DOMAIN_BASE=${DOMAIN_BASE}
      # ACME DNS-01 via OVH (lego) — permet le wildcard *.lan.${DOMAIN_BASE} et
      # supprime la dépendance au challenge HTTP sur :80
      - OVH_ENDPOINT=${OVH_ENDPOINT}
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--log.level=INFO"
      - "--ping=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsEncrypt.acme.dnsChallenge.provider=ovh"
      - "--certificatesresolvers.letsEncrypt.acme.dnsChallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsEncrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.letsEncrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Logs pour CrowdSec
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
      # Plugin CrowdSec Bouncer
      - "--experimental.plugins.bouncer.modulename=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      - "--experimental.plugins.bouncer.version=v1.6.0"
      # Fichier de configuration dynamique (middleware plugin)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    ports:
      - 80:80
      - 443:443
    extra_hosts:
      - "host.docker.internal:host-gateway" # A TESTER
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - traefik_letsencrypt:/letsencrypt
      - traefik_config:/etc/traefik
      - traefik_logs:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      # Middleware crowdsec-bouncer défini dans traefik-dynamic.yml (file provider)
    profiles:
      - infrastructure
      - all

  # Tailscale - nœud tailnet "dah-proxy" (accès privé aux services *.lan.${DOMAIN_BASE})
  # Sidecar dans le netns de Traefik : l'IP tailnet 100.x du nœud expose directement
  # Traefik :443 aux devices du tailnet (routage host-based inchangé).
  # TS_USERSPACE=false requis : le mode userspace (défaut) ne délivre pas le trafic
  # entrant sans `tailscale serve` — le kernel networking (tun) le fait nativement.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    network_mode: "service:traefik"
    depends_on:
      traefik:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=dah-proxy
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # Ne pas se ré-authentifier à chaque restart (l'état persiste dans le volume)
      - TS_AUTH_ONCE=true
      # Ne PAS accepter le DNS MagicDNS : le netns est partagé avec Traefik,
      # qui doit continuer de résoudre les noms de conteneurs via le DNS Docker.
      - TS_ACCEPT_DNS=false
      # Healthcheck natif (v1.78+) : /healthz répond 200 si le nœud a une IP tailnet
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:9002/healthz || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - dah_proxy_state:/var/lib/tailscale
    profiles:
      - infrastructure
      - all

  # Homarr - Dashboard
  # Portainer - Container Management
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: "on-failure:2"
    mem_limit: 128m
    memswap_limit: 128m
    networks:
      - traefik_net
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.portainer.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.portainer.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
    depends_on:
      traefik:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    profiles:
      - infrastructure
      - all

  # Watchtower - Auto-updates
  # Seerr - Demandes de médias pour Jellyfin
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055/api/v1/settings/public || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - seerr_config:/app/config
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.${DOMAIN_BASE}`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.routers.seerr.tls.certresolver=letsEncrypt"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=traefik_net"
      # CrowdSec only (OIDC géré directement par Seerr)
      - "traefik.http.routers.seerr.middlewares=crowdsec-bouncer@file"
    profiles:
      - media
      - all

  # Jellyfin tourne nativement (transcodage matériel) ; routage dans traefik-dynamic.yml.

  # Radarr - Films
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - RADARR__AUTH__METHOD=External
    volumes:
      - radarr_config:/config
      - ${MEDIA_PATH}:/data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.radarr.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.radarr.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.radarr.middlewares=authentik-radarr@docker"
      - "traefik.http.middlewares.authentik-radarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-radarr.forwardauth.trustForwardHeader=true"
      # API hors Authentik (auth par clé X-Api-Key) pour clients natifs type Helmarr (via tailnet)
      - "traefik.http.routers.radarr-api.rule=Host(`radarr.lan.${DOMAIN_BASE}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.radarr-api.entrypoints=websecure"
      - "traefik.http.routers.radarr-api.tls=true"
      - "traefik.http.routers.radarr-api.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.radarr-api.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.radarr-api.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.routers.radarr-api.service=radarr"
      - "traefik.http.routers.radarr-api.priority=100"
    profiles:
      - media
      - all

  # Sonarr - Séries TV
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SONARR__AUTH__METHOD=External
    volumes:
      - sonarr_config:/config
      - ${MEDIA_PATH}:/data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.sonarr.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.sonarr.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.sonarr.middlewares=authentik-sonarr@docker"
      - "traefik.http.middlewares.authentik-sonarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-sonarr.forwardauth.trustForwardHeader=true"
      # API hors Authentik (auth par clé X-Api-Key) pour clients natifs type Helmarr (via tailnet)
      - "traefik.http.routers.sonarr-api.rule=Host(`sonarr.lan.${DOMAIN_BASE}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.sonarr-api.entrypoints=websecure"
      - "traefik.http.routers.sonarr-api.tls=true"
      - "traefik.http.routers.sonarr-api.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.sonarr-api.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.sonarr-api.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.routers.sonarr-api.service=sonarr"
      - "traefik.http.routers.sonarr-api.priority=100"
    profiles:
      - media
      - all

  # Gluetun - VPN Gateway (ProtonVPN WireGuard)
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      # OpenVPN : port forwardé ProtonVPN stable (en WireGuard il tourne toutes les ~90s, cf. gluetun#3196)
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PROTON_OPENVPN_USER}
      - OPENVPN_PASSWORD=${PROTON_OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=Netherlands
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      # Sync du port forwardé délégué à gluetun-qbt-watchdog (remplace l'ancien VPN_PORT_FORWARDING_UP_COMMAND)
      # Control server : routes privées par défaut depuis gluetun v3.40 → auth par clé API pour le watchdog
      - 'HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"apikey","apikey":"${GLUETUN_API_KEY}"}'
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbt.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.qbittorrent.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.qbittorrent.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.qbittorrent.middlewares=authentik-qbittorrent@docker"
      - "traefik.http.middlewares.authentik-qbittorrent.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-qbittorrent.forwardauth.trustForwardHeader=true"
      # API hors Authentik (auth WebUI qBittorrent réactivée) pour clients natifs type Helmarr (via tailnet)
      - "traefik.http.routers.qbittorrent-api.rule=Host(`qbt.lan.${DOMAIN_BASE}`) && PathPrefix(`/api/v2`)"
      - "traefik.http.routers.qbittorrent-api.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent-api.tls=true"
      - "traefik.http.routers.qbittorrent-api.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.qbittorrent-api.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.qbittorrent-api.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.routers.qbittorrent-api.service=qbittorrent"
      - "traefik.http.routers.qbittorrent-api.priority=100"
    profiles:
      - media
      - all

  # qBittorrent - Client Torrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent_config:/config
      - ${MEDIA_PATH}:/data
      - ./qbittorrent-dracula:/dracula-webui:ro
    profiles:
      - media
      - all

  # Watchdog: sync du port forwardé Gluetun → qBittorrent + redémarrage qBittorrent au besoin
  # https://github.com/brunoorsolon/gluetun-qbt-watchdog
  gluetun-qbt-watchdog:
    image: ghcr.io/brunoorsolon/gluetun-qbt-watchdog:latest
    container_name: gluetun-qbt-watchdog
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    # Pas de healthcheck natif : en mode password le script réécrit /tmp/qbt_login_response.txt
    # à chaque cycle (30s) → on en vérifie la fraîcheur (< 5 min) pour détecter une boucle figée.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test $(( $(date +%s) - $(stat -c %Y /tmp/qbt_login_response.txt 2>/dev/null || echo 0) )) -lt 300",
        ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      - gluetun
      - qbittorrent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ}
      - GLUETUN_CONTAINER_NAME=gluetun
      - GLUETUN_API=http://gluetun:8000
      - GLUETUN_API_KEY=${GLUETUN_API_KEY}
      - QBT_CONTAINER_NAME=qbittorrent
      # qBittorrent tourne dans le netns de gluetun → joignable via gluetun:8080
      - QBT_API=http://gluetun:8080
      - QBT_AUTH_MODE=password
      - QBT_USER=${QBT_USER}
      - QBT_PASS=${QBT_PASS}
      - CHECK_INTERVAL=30
    networks:
      - traefik_net
    profiles:
      - media
      - all

  # cross-seed - https://www.cross-seed.org
  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6
    container_name: cross-seed
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    user: "${PUID}:${PGID}" # cross-seed ignore PUID/PGID
    depends_on:
      - gluetun
      - prowlarr
    environment:
      - QBT_USER=${QBT_USER}
      - QBT_PASS=${QBT_PASS}
      - CROSS_SEED_TORZNAB=${CROSS_SEED_TORZNAB}
      - CROSS_SEED_APIKEY=${CROSS_SEED_APIKEY}
    volumes:
      - ./cross-seed:/config
      - ${MEDIA_PATH}:/data
    networks:
      - traefik_net
    command: daemon
    profiles:
      - media
      - all

  # Prowlarr - Indexer Manager
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: "on-failure:2"
    mem_limit: 384m
    memswap_limit: 384m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PROWLARR__AUTH__METHOD=External
    volumes:
      - prowlarr_config:/config
      - ./ygege.yml:/config/Definitions/Custom/ygege.yml:ro
    networks:
      - traefik_net
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.prowlarr.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.prowlarr.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.prowlarr.middlewares=authentik-prowlarr@docker"
      - "traefik.http.middlewares.authentik-prowlarr.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-prowlarr.forwardauth.trustForwardHeader=true"
      # API hors Authentik (auth par clé X-Api-Key) pour clients natifs type Helmarr (via tailnet)
      - "traefik.http.routers.prowlarr-api.rule=Host(`prowlarr.lan.${DOMAIN_BASE}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.prowlarr-api.entrypoints=websecure"
      - "traefik.http.routers.prowlarr-api.tls=true"
      - "traefik.http.routers.prowlarr-api.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.prowlarr-api.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.prowlarr-api.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.routers.prowlarr-api.service=prowlarr"
      - "traefik.http.routers.prowlarr-api.priority=100"
    profiles:
      - media
      - all

  # Jellystat - Statistiques Jellyfin
  jellystat-db:
    image: postgres:16-alpine
    container_name: jellystat-db
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      POSTGRES_USER: ${JELLYSTAT_POSTGRES_USER:-jellystat}
      POSTGRES_PASSWORD: ${JELLYSTAT_POSTGRES_PASSWORD:?jellystat database password required}
      POSTGRES_DB: ${JELLYSTAT_POSTGRES_DB:-jellystat}
      TZ: ${TZ}
    volumes:
      - jellystat_postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - media
      - all

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      jellystat-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/'', r => process.exit(r.statusCode < 500 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - TZ=${TZ}
      - POSTGRES_USER=${JELLYSTAT_POSTGRES_USER:-jellystat}
      - POSTGRES_PASSWORD=${JELLYSTAT_POSTGRES_PASSWORD:?jellystat database password required}
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - JWT_SECRET=${JELLYSTAT_JWT_SECRET:?jellystat JWT secret required}
    volumes:
      - jellystat_backup_data:/app/backend/backup-data
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellystat.rule=Host(`jellystat.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.jellystat.entrypoints=websecure"
      - "traefik.http.routers.jellystat.tls=true"
      - "traefik.http.routers.jellystat.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.jellystat.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.jellystat.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.jellystat.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.jellystat.middlewares=authentik-jellystat@docker"
      - "traefik.http.middlewares.authentik-jellystat.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-jellystat.forwardauth.trustForwardHeader=true"
      # API + proxy hors Authentik (auth par clé x-api-token Jellystat) pour clients natifs type Helmarr (via tailnet)
      - "traefik.http.routers.jellystat-api.rule=Host(`jellystat.lan.${DOMAIN_BASE}`) && (PathPrefix(`/api`) || PathPrefix(`/proxy`))"
      - "traefik.http.routers.jellystat-api.entrypoints=websecure"
      - "traefik.http.routers.jellystat-api.tls=true"
      - "traefik.http.routers.jellystat-api.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.jellystat-api.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.jellystat-api.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.routers.jellystat-api.service=jellystat"
      - "traefik.http.routers.jellystat-api.priority=100"
    profiles:
      - media
      - all

  # RSSHub - RSS Feed Generator
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: "on-failure:2"
    mem_limit: 384m
    memswap_limit: 384m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:1200/'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
      - NODE_OPTIONS=--max-old-space-size=320
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rsshub.rule=Host(`rsshub.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.rsshub.entrypoints=websecure"
      - "traefik.http.routers.rsshub.tls=true"
      - "traefik.http.routers.rsshub.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.rsshub.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.rsshub.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.rsshub.loadbalancer.server.port=1200"
      - "traefik.docker.network=traefik_net"
    profiles:
      - tools
      - all

  # FreshRSS - RSS Feed Reader
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f apache2 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # OIDC_CLIENT_ID / OIDC_CLIENT_SECRET fournis par Terraform
    # (cf. terraform/authentik/generated/freshrss.env)
    env_file:
      - ./terraform/authentik/generated/freshrss.env
    environment:
      - TZ=${TZ}
      - CRON_MIN=1,31
      # OIDC Configuration avec Authentik
      - OIDC_ENABLED=1
      - OIDC_PROVIDER_METADATA_URL=https://auth.${DOMAIN_BASE}/application/o/freshrss/.well-known/openid-configuration
      - OIDC_X_FORWARDED_HEADERS=X-Forwarded-Proto X-Forwarded-Host
      - OIDC_SCOPES=openid email profile
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freshrss.rule=Host(`rss.${DOMAIN_BASE}`)"
      - "traefik.http.routers.freshrss.entrypoints=websecure"
      - "traefik.http.routers.freshrss.tls=true"
      - "traefik.http.routers.freshrss.tls.certresolver=letsEncrypt"
      - "traefik.http.services.freshrss.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
      # Public : CrowdSec (OIDC géré directement par FreshRSS)
      - "traefik.http.routers.freshrss.middlewares=crowdsec-bouncer@file"
    profiles:
      - tools
      - all

  # IT-Tools - Boîte à outils dev (offline, 100% statique côté client)
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: "on-failure:2"
    mem_limit: 64m
    memswap_limit: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - TZ=${TZ}
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-tools.rule=Host(`it.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.it-tools.entrypoints=websecure"
      - "traefik.http.routers.it-tools.tls=true"
      - "traefik.http.routers.it-tools.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.it-tools.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.it-tools.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.it-tools.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
    profiles:
      - tools
      - all

  # ChangeDetection.io - Surveillance de pages web + notifications au changement
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      authentik-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/',timeout=5).status < 500 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
      # Base URL pour que les liens dans les notifications pointent sur le bon hôte
      - BASE_URL=https://changedetection.lan.${DOMAIN_BASE}
      # Décommenter + activer le sidecar navigateur ci-dessous pour les pages JS
      # - PLAYWRIGHT_DRIVER_URL=ws://changedetection-browser:3000
    volumes:
      - changedetection_data:/datastore
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.changedetection.rule=Host(`changedetection.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.changedetection.entrypoints=websecure"
      - "traefik.http.routers.changedetection.tls=true"
      - "traefik.http.routers.changedetection.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.changedetection.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.changedetection.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.changedetection.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.changedetection.middlewares=authentik-changedetection@docker"
      - "traefik.http.middlewares.authentik-changedetection.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-changedetection.forwardauth.trustForwardHeader=true"
    profiles:
      - tools
      - all

  # YGege - Nostr to Torznab Bridge
  ygege:
    image: uwucode/ygege:latest
    container_name: ygege
    restart: "on-failure:2"
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://localhost:$${BIND_PORT:-8715}/health || exit 1",
        ]
      interval: 1m30s
      timeout: 20s
      retries: 3
      start_period: 10s
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    networks:
      - traefik_net
    profiles:
      - media
      - all

  # PostgreSQL Authentik - Base de données dédiée
  authentik-db:
    image: postgres:16-alpine
    container_name: authentik-db
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?authentik database password required}
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB:-authentik}
      TZ: ${TZ}
    volumes:
      - postgres_authentik_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - infrastructure
      - devtools
      - all

  # Authentik Server - SSO/Identity Provider
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.10.1
    container_name: authentik-server
    restart: unless-stopped
    command: server
    mem_limit: 1g
    memswap_limit: 1g
    depends_on:
      authentik-db:
        condition: service_healthy
    networks:
      - traefik_net
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9000/-/health/live/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?authentik secret key required}
      TZ: ${TZ}
    volumes:
      - authentik_media:/media
      - authentik_custom_templates:/templates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN_BASE}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.tls.certresolver=letsEncrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
      # CrowdSec protection
      - "traefik.http.routers.authentik.middlewares=crowdsec-bouncer@file"
    profiles:
      - infrastructure
      - devtools
      - all

  # Homepage - Dashboard léger
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: "on-failure:2"
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      authentik-server:
        condition: service_healthy
    networks:
      - traefik_net
    extra_hosts:
      # Widget Glances : Glances tourne nativement sur l'hôte (port 61208)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./homepage-settings/services.yaml:/app/config/services.yaml
      - ./homepage-settings/settings.yaml:/app/config/settings.yaml
      - ./homepage-settings/widgets.yaml:/app/config/widgets.yaml
      - ./homepage-settings/docker.yaml:/app/config/docker.yaml
      - homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MEDIA_PATH}:/mnt/media:ro
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=lan.${DOMAIN_BASE}
      # Domaine public (liens jellyfin/seerr/auth) et zone privée tailnet (le reste)
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN_BASE}
      - HOMEPAGE_VAR_PRIVATE_DOMAIN=lan.${DOMAIN_BASE}
      - HOMEPAGE_VAR_RADARR_API_KEY=${RADARR_API_KEY}
      - HOMEPAGE_VAR_SONARR_API_KEY=${SONARR_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.homepage.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.homepage.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_net"
      # Privé (tailnet) : Authentik conservé en défense-en-profondeur, CrowdSec retiré
      - "traefik.http.routers.homepage.middlewares=authentik-homepage@docker"
      - "traefik.http.middlewares.authentik-homepage.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-homepage.forwardauth.trustForwardHeader=true"
    profiles:
      - dashboard
      - infrastructure
      - all

  # SonarQube - Analyse de code
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: on-failure
    mem_limit: 2560m
    memswap_limit: 2560m
    depends_on:
      sonarqube-db:
        condition: service_healthy
      authentik-server:
        condition: service_healthy
    healthcheck:
      # L'image sonarqube:community n'embarque pas wget, seulement curl
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9000/api/system/status || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_POSTGRES_DB:-sonarqube}
      - SONAR_JDBC_USERNAME=${SONARQUBE_POSTGRES_USER:-sonarqube}
      - SONAR_JDBC_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD:?sonarqube database password required}
      # Limites mémoire JVM (Xms doit être égal à Xmx pour Elasticsearch)
      - SONAR_WEB_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_CE_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_SEARCH_JAVAOPTS=-Xmx512m -Xms512m
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarqube.rule=Host(`sonarqube.lan.${DOMAIN_BASE}`)"
      - "traefik.http.routers.sonarqube.entrypoints=websecure"
      - "traefik.http.routers.sonarqube.tls=true"
      - "traefik.http.routers.sonarqube.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.sonarqube.tls.domains[0].main=lan.${DOMAIN_BASE}"
      - "traefik.http.routers.sonarqube.tls.domains[0].sans=*.lan.${DOMAIN_BASE}"
      - "traefik.http.services.sonarqube.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik_net"
    profiles:
      - devtools
      - all

  # SonarQube PostgreSQL Database
  sonarqube-db:
    image: postgres:16-alpine
    container_name: sonarqube-db
    restart: "on-failure:2"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SONARQUBE_POSTGRES_USER:-sonarqube} -d ${SONARQUBE_POSTGRES_DB:-sonarqube}",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - POSTGRES_USER=${SONARQUBE_POSTGRES_USER:-sonarqube}
      - POSTGRES_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD:?sonarqube database password required}
      - POSTGRES_DB=${SONARQUBE_POSTGRES_DB:-sonarqube}
      - TZ=${TZ}
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data
    networks:
      - traefik_net
    profiles:
      - devtools
      - all

  # CrowdSec - Security Engine (IPS collaboratif)
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - TZ=${TZ}
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/whitelist-good-actors crowdsecurity/linux crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - GID=${PGID}
      # Enroll key pour la console CrowdSec
      - ENROLL_KEY=${CROWDSEC_ENROLL_KEY}
      - ENROLL_INSTANCE_NAME=${HOSTNAME:-docker-server}
    volumes:
      - crowdsec_config:/etc/crowdsec
      - crowdsec_data:/var/lib/crowdsec/data
      # Configuration d'acquisition personnalisée
      - ./crowdsec-acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      # Logs Traefik à analyser
      - traefik_logs:/var/log/traefik:ro
      # Logs SSH (host)
      - /var/log/auth.log:/var/log/auth.log:ro
      # Docker socket pour lire les logs des conteneurs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=false"
    networks:
      - traefik_net
    profiles:
      - security
      - infrastructure
      - all

networks:
  traefik_net:
    name: traefik_net
    external: true

volumes:
  # Traefik
  traefik_letsencrypt:
  traefik_config:
  traefik_logs:

  # Tailscale (état du nœud dah-proxy — doit persister pour garder l'identité)
  dah_proxy_state:

  # Homepage
  homepage_config:

  # Portainer
  portainer_data:

  # Seerr
  seerr_config:

  # Radarr
  radarr_config:

  # Sonarr
  sonarr_config:

  # qBittorrent
  qbittorrent_config:

  # Prowlarr
  prowlarr_config:

  # Authentik
  postgres_authentik_data:
  authentik_media:
  authentik_custom_templates:

  # SonarQube
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres_data:

  # CrowdSec
  crowdsec_config:
  crowdsec_data:

  # FreshRSS
  freshrss_data:
  freshrss_extensions:

  # Jellystat
  jellystat_postgres_data:
  jellystat_backup_data:

  # ChangeDetection.io
  changedetection_data:
