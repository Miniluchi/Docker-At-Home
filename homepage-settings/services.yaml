---
# Homepage Services Configuration
# Documentation: https://gethomepage.dev/configs/services/

- Demandes:
    - Radarr:
        href: https://radarr.{{HOMEPAGE_VAR_DOMAIN}}
        icon: radarr.png
        description: Gestionnaire films
        server: my-docker
        container: radarr
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
          fields: ["movies", "wanted", "queued"]
    - Sonarr:
        href: https://sonarr.{{HOMEPAGE_VAR_DOMAIN}}
        icon: sonarr.png
        description: Gestionnaire series
        server: my-docker
        container: sonarr
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
          fields: ["series", "wanted", "queued"]

- Medias:
    - Jellyfin:
        href: https://jellyfin.{{HOMEPAGE_VAR_DOMAIN}}
        icon: jellyfin.png
        description: Streaming video
        server: my-docker
        container: jellyfin
    - Seerr:
        href: https://seerr.{{HOMEPAGE_VAR_DOMAIN}}
        icon: jellyseerr.png
        description: Demandes de medias
        server: my-docker
        container: seerr
    - Prowlarr:
        href: https://prowlarr.{{HOMEPAGE_VAR_DOMAIN}}
        icon: prowlarr.png
        description: Indexeurs
        server: my-docker
        container: prowlarr
    - qBittorrent:
        href: https://qbt.{{HOMEPAGE_VAR_DOMAIN}}
        icon: qbittorrent.png
        description: Client torrent
        server: my-docker
        container: qbittorrent

- Infrastructure:
    - Portainer:
        href: https://portainer.{{HOMEPAGE_VAR_DOMAIN}}
        icon: portainer.png
        description: Gestion Docker
        server: my-docker
        container: portainer
    - Authentik:
        href: https://auth.{{HOMEPAGE_VAR_DOMAIN}}
        icon: authentik.png
        description: SSO / Identity Provider
        server: my-docker
        container: authentik-server
    - OpenMediaVault:
        href: https://omv.{{HOMEPAGE_VAR_DOMAIN}}
        icon: openmediavault.png
        description: NAS / Stockage
        server: my-docker
        container: omv-proxy
    - Glances:
        href: https://glances.{{HOMEPAGE_VAR_DOMAIN}}
        icon: glances.png
        description: Monitoring systeme
        server: my-docker
        container: glances

- Automatisation:
    - Home Assistant:
        href: https://home.{{HOMEPAGE_VAR_DOMAIN}}
        icon: home-assistant.png
        description: Domotique
        server: my-docker
        container: homeassistant

- Outils:
    - Planka:
        href: https://planka.{{HOMEPAGE_VAR_DOMAIN}}
        icon: planka.png
        description: Kanban / Gestion projets
        server: my-docker
        container: planka
    - SonarQube:
        href: https://sonarqube.{{HOMEPAGE_VAR_DOMAIN}}
        icon: sonarqube.png
        description: Analyse de code
        server: my-docker
        container: sonarqube
    - FreshRSS:
        href: https://rss.{{HOMEPAGE_VAR_DOMAIN}}
        icon: freshrss.png
        description: Lecteur RSS
        server: my-docker
        container: freshrss
    - RSSHub:
        href: https://rsshub.{{HOMEPAGE_VAR_DOMAIN}}
        icon: rsshub.png
        description: Generateur de flux RSS
        server: my-docker
        container: rsshub

- Metriques:
    - CPU:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: cpu
          chart: true
          refreshInterval: 3000
          pointsLimit: 30
    - Memory:
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: memory
          chart: true
          refreshInterval: 3000
          pointsLimit: 30
