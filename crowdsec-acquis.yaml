# Logs Traefik
filenames:
  - /var/log/traefik/access.log
labels:
  type: traefik
---
# Logs SSH
filenames:
  - /var/log/auth.log
labels:
  type: syslog
---
# Logs Authentik via Docker
source: docker
container_name:
  - authentik-server
labels:
  type: authentik
---
# AppSec WAF — listener interrogé par le bouncer Traefik (port 7422)
appsec_configs:
  - crowdsecurity/appsec-default
source: appsec
listen_addr: 0.0.0.0:7422
labels:
  type: appsec
