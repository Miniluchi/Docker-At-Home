http:
  routers:
    # Jellyfin natif (transcodage matériel)
    jellyfin:
      rule: "Host(`jellyfin.{{ env "DOMAIN_BASE" }}`)"
      entryPoints:
        - websecure
      service: jellyfin
      middlewares:
        - crowdsec-bouncer
      tls:
        certResolver: letsEncrypt

    # Glances natif (monitoring de l'hôte macOS)
    glances:
      rule: "Host(`glances.{{ env "DOMAIN_BASE" }}`)"
      entryPoints:
        - websecure
      service: glances
      middlewares:
        - crowdsec-bouncer
        - authentik-glances
      tls:
        certResolver: letsEncrypt

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8096"

    glances:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:61208"

  middlewares:
    # Authentik forward-auth (SSO) pour Glances natif
    authentik-glances:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true

    crowdsec-bouncer:
      plugin:
        bouncer:
          enabled: true
          crowdsecMode: live
          crowdsecLapiKey: "{{ env "CROWDSEC_BOUNCER_API_KEY" }}"
          crowdsecLapiHost: crowdsec:8080
          # AppSec WAF
          crowdsecAppsecEnabled: true
          crowdsecAppsecHost: crowdsec:7422
          crowdsecAppsecFailureBlock: true
          # fail-open si CrowdSec est injoignable (évite un 403 global au redémarrage)
          crowdsecAppsecUnreachableBlock: false
